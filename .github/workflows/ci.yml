name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - name: Verify token trust-root isolation
        # Defence-in-depth gate covering two trust-root downgrade modes:
        #   - PROD_TOKEN_KEY left as PLACEHOLDER (would ship a worthless key)
        #   - PROD_TOKEN_KEY == DEV_TOKEN_KEY (would trust the public dev
        #     private half — D4 revocation bypass)
        #   - PROD_TOKEN_KEY == license PROD_KEY (collapses the two trust
        #     roots designed to fail independently)
        # Same check runs in release.yml before publish for double coverage.
        run: node scripts/verify-trust-root.mjs
