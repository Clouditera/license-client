name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - name: Verify token trust-root isolation (release gate)
        # Re-run trust-root verification at release time so a stale tag pushed
        # before a fresh main-branch CI run still gets blocked.
        run: node scripts/verify-trust-root.mjs
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
